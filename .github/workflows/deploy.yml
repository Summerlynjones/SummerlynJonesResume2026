name: Deploy Resume to Azure

on:
  push:
    branches:
      - main  # Change to master if your default branch is called master

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"          # Your HTML is in the root folder
          output_location: ""         # Leaving it clean and blank
          skip_app_build: true        # CRITICAL: Forces Azure to host raw HTML without failing



