name: Deploy Resume to Azure

on:
  push:
    branches:
      - main  # Change to master if your default branch is called master

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload Raw HTML to Azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "."          # Directs Azure straight to the root folder
          output_location: "."       # Prevents Oryx from searching for a build folder
          skip_app_build: true       # Tells Azure not to run any Node compilation engines
